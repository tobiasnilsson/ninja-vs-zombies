<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja vs Zombies - Prototype</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            border: 3px solid #4a4a6a;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #healthBar {
            width: 150px;
            height: 20px;
            background: #333;
            border: 2px solid #666;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 5px;
        }
        #healthFill {
            height: 100%;
            background: linear-gradient(to bottom, #4f4, #2a2);
            transition: width 0.2s;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            border-radius: 8px;
        }
        #overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
        }
        #overlay p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #aaa;
        }
        #overlay button {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(to bottom, #c44, #922);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.1s;
        }
        #overlay button:hover {
            transform: scale(1.05);
            background: linear-gradient(to bottom, #d55, #a33);
        }
        .hidden { display: none !important; }
        #levelComplete {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            border-radius: 8px;
        }
        #levelComplete h1 {
            font-size: 42px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
        }
        #levelComplete p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #aaa;
        }
        #levelComplete button {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(to bottom, #4a4, #282);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.1s;
        }
        #levelComplete button:hover {
            transform: scale(1.05);
            background: linear-gradient(to bottom, #5b5, #393);
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #888;
            font-size: 12px;
        }
        #musicControl {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #888;
            font-size: 14px;
        }
        #volumeSlider {
            width: 80px;
            vertical-align: middle;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="game" width="1800" height="1000"></canvas>
        <div id="ui">
            <div id="healthBar"><div id="healthFill" style="width: 100%"></div></div>
            <div id="stats">Level: <span id="levelNum">1</span> | HP: <span id="hp">5</span>/5 | Zombies: <span id="zombieCount">0</span></div>
        </div>
        <div id="controls">A/D or Arrows: Move | Space: Jump | Click or F: Throw Shuriken</div>
        <div id="musicControl">
            <label>🎵 <input type="range" id="volumeSlider" min="0" max="100" value="30" onchange="Music.setVolume(this.value/100)"></label>
        </div>

        <div id="overlay">
            <h1>🥷 Ninja vs Zombies</h1>
            <p>Defeat all zombies to win!</p>
            <button onclick="startGame()">Start Game</button>
        </div>

        <div id="gameOver" class="hidden">
            <h1 style="color: #c44;">Game Over</h1>
            <p>The zombies got you on level <span id="deathLevel">1</span>!</p>
            <button onclick="retryLevel()">Retry Level</button>
            <button onclick="startGame()" style="background: linear-gradient(to bottom, #666, #444);">Restart Game</button>
        </div>

        <div id="victory" class="hidden">
            <h1 style="color: #4c4;">Victory!</h1>
            <p>You completed all levels!</p>
            <button onclick="startGame()">Play Again</button>
        </div>

        <div id="levelComplete" class="hidden">
            <h1 style="color: #4c4;">Level <span id="completedLevel">1</span> Complete!</h1>
            <p>Get ready for the next challenge...</p>
            <button onclick="nextLevel()">Next Level</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        // Audio context
        let audioCtx = null;
        let musicPlaying = false;
        let musicVolume = 0.3;
        let masterGain = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = musicVolume;
                masterGain.connect(audioCtx.destination);
            }
        }

        // Background music system
        const Music = {
            bpm: 140,
            currentBeat: 0,
            nextNoteTime: 0,
            timerID: null,

            // Dark ninja theme in A minor
            bassPattern: [55, 55, 55, 55, 52, 52, 52, 52, 49, 49, 49, 49, 52, 52, 55, 55], // A, G, E, G, A
            melodyPattern: [
                { note: 69, dur: 2 },  // A
                { note: 72, dur: 1 },  // C
                { note: 74, dur: 1 },  // D
                { note: 76, dur: 2 },  // E
                { note: 74, dur: 2 },  // D
                { note: 72, dur: 2 },  // C
                { note: 69, dur: 2 },  // A
                { note: 67, dur: 2 },  // G
                { note: 69, dur: 2 },  // A
            ],
            melodyIndex: 0,
            melodyCounter: 0,

            start() {
                if (musicPlaying) return;
                musicPlaying = true;
                this.currentBeat = 0;
                this.nextNoteTime = audioCtx.currentTime;
                this.melodyIndex = 0;
                this.melodyCounter = 0;
                this.schedule();
            },

            stop() {
                musicPlaying = false;
                if (this.timerID) {
                    clearTimeout(this.timerID);
                    this.timerID = null;
                }
            },

            midiToFreq(midi) {
                return 440 * Math.pow(2, (midi - 69) / 12);
            },

            schedule() {
                if (!musicPlaying) return;

                const secondsPerBeat = 60.0 / this.bpm;

                while (this.nextNoteTime < audioCtx.currentTime + 0.1) {
                    this.playBeat(this.currentBeat, this.nextNoteTime);
                    this.nextNoteTime += secondsPerBeat / 2; // 8th notes
                    this.currentBeat = (this.currentBeat + 1) % 16;
                }

                this.timerID = setTimeout(() => this.schedule(), 25);
            },

            playBeat(beat, time) {
                // Bass on every beat
                this.playBass(this.bassPattern[beat], time);

                // Kick drum on 1 and 3
                if (beat % 4 === 0) {
                    this.playKick(time);
                }

                // Snare on 2 and 4
                if (beat % 4 === 2) {
                    this.playSnare(time);
                }

                // Hi-hat on every 8th note
                this.playHiHat(time, beat % 2 === 0 ? 0.08 : 0.04);

                // Melody (plays every few beats based on duration)
                if (beat % 2 === 0) {
                    this.melodyCounter++;
                    const currentMelody = this.melodyPattern[this.melodyIndex];
                    if (this.melodyCounter >= currentMelody.dur) {
                        this.melodyCounter = 0;
                        this.melodyIndex = (this.melodyIndex + 1) % this.melodyPattern.length;
                        this.playMelody(this.melodyPattern[this.melodyIndex].note, time);
                    }
                }
            },

            playBass(midiNote, time) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(masterGain);

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(this.midiToFreq(midiNote - 12), time);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(200, time);

                gain.gain.setValueAtTime(0.25, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);

                osc.start(time);
                osc.stop(time + 0.2);
            },

            playMelody(midiNote, time) {
                const osc = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gain);
                gain.connect(masterGain);

                osc.type = 'square';
                osc2.type = 'sawtooth';
                const freq = this.midiToFreq(midiNote);
                osc.frequency.setValueAtTime(freq, time);
                osc2.frequency.setValueAtTime(freq * 1.005, time); // Slight detune

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(2000, time);
                filter.frequency.exponentialRampToValueAtTime(500, time + 0.3);

                gain.gain.setValueAtTime(0.12, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.35);

                osc.start(time);
                osc2.start(time);
                osc.stop(time + 0.35);
                osc2.stop(time + 0.35);
            },

            playKick(time) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.connect(gain);
                gain.connect(masterGain);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, time);
                osc.frequency.exponentialRampToValueAtTime(30, time + 0.1);

                gain.gain.setValueAtTime(0.4, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);

                osc.start(time);
                osc.stop(time + 0.15);
            },

            playSnare(time) {
                // Noise for snare
                const bufferSize = audioCtx.sampleRate * 0.1;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                const noise = audioCtx.createBufferSource();
                const noiseGain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                noise.buffer = buffer;
                noise.connect(filter);
                filter.connect(noiseGain);
                noiseGain.connect(masterGain);

                filter.type = 'highpass';
                filter.frequency.setValueAtTime(1000, time);

                noiseGain.gain.setValueAtTime(0.2, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);

                noise.start(time);
                noise.stop(time + 0.1);

                // Add body
                const osc = audioCtx.createOscillator();
                const oscGain = audioCtx.createGain();
                osc.connect(oscGain);
                oscGain.connect(masterGain);

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, time);
                osc.frequency.exponentialRampToValueAtTime(100, time + 0.05);

                oscGain.gain.setValueAtTime(0.15, time);
                oscGain.gain.exponentialRampToValueAtTime(0.01, time + 0.05);

                osc.start(time);
                osc.stop(time + 0.05);
            },

            playHiHat(time, volume) {
                const bufferSize = audioCtx.sampleRate * 0.05;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                const noise = audioCtx.createBufferSource();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                noise.buffer = buffer;
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(masterGain);

                filter.type = 'highpass';
                filter.frequency.setValueAtTime(8000, time);

                gain.gain.setValueAtTime(volume, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.03);

                noise.start(time);
                noise.stop(time + 0.03);
            },

            setVolume(vol) {
                musicVolume = vol;
                if (masterGain) {
                    masterGain.gain.value = vol;
                }
            }
        };

        // Sound effect functions
        const SFX = {
            throw: () => {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);

                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.1);
            },

            hit: () => {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'square';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);

                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.15);
            },

            zombieDeath: () => {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.connect(gain);
                osc2.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.4);

                osc2.type = 'square';
                osc2.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc2.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.4);

                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);

                osc.start(audioCtx.currentTime);
                osc2.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.4);
                osc2.stop(audioCtx.currentTime + 0.4);
            },

            playerHurt: () => {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.setValueAtTime(300, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(200, audioCtx.currentTime + 0.2);

                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
            },

            jump: () => {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);

                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.1);
            },

            victory: () => {
                if (!audioCtx) return;
                const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
                notes.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);

                    osc.type = 'square';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);

                    gain.gain.setValueAtTime(0, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.3);

                    osc.start(audioCtx.currentTime + i * 0.15);
                    osc.stop(audioCtx.currentTime + i * 0.15 + 0.3);
                });
            },

            gameOver: () => {
                if (!audioCtx) return;
                const notes = [400, 350, 300, 200]; // Descending sad tones
                notes.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);

                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.2);

                    gain.gain.setValueAtTime(0, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.12, audioCtx.currentTime + i * 0.2);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.2 + 0.35);

                    osc.start(audioCtx.currentTime + i * 0.2);
                    osc.stop(audioCtx.currentTime + i * 0.2 + 0.35);
                });
            },

            zombieHit: () => {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(250, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);

                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.1);
            },

            zombieAttack: () => {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                osc.frequency.setValueAtTime(180, audioCtx.currentTime + 0.05);
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.2);

                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);

                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.2);
            }
        };

        // Game state
        let gameRunning = false;
        let player = null;
        let platforms = [];
        let zombies = [];
        let shurikens = [];
        let particles = [];
        let currentLevel = 1;
        const maxLevel = 10;

        // Input
        const keys = {};
        let mouseDown = false;

        // Constants
        const GRAVITY = 0.6;
        const FRICTION = 0.85;

        // Player class
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 28;
                this.height = 40;
                this.vx = 0;
                this.vy = 0;
                this.speed = 8;
                this.jumpForce = 18;
                this.grounded = false;
                this.facingRight = true;
                this.hp = 5;
                this.maxHp = 5;
                this.invincible = false;
                this.invincibleTimer = 0;
                this.throwCooldown = 0;
            }

            update() {
                // Movement
                if (keys['ArrowLeft'] || keys['KeyA']) {
                    this.vx = -this.speed;
                    this.facingRight = false;
                } else if (keys['ArrowRight'] || keys['KeyD']) {
                    this.vx = this.speed;
                    this.facingRight = true;
                } else {
                    this.vx *= FRICTION;
                }

                // Jump
                if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && this.grounded) {
                    this.vy = -this.jumpForce;
                    this.grounded = false;
                    SFX.jump();
                }

                // Throw shuriken
                if ((keys['KeyF'] || mouseDown) && this.throwCooldown <= 0) {
                    this.throwShuriken();
                    this.throwCooldown = 15;
                }

                // Apply gravity
                this.vy += GRAVITY;

                // Update position
                this.x += this.vx;
                this.y += this.vy;

                // Platform collision
                this.grounded = false;
                for (let plat of platforms) {
                    if (this.collidesWith(plat)) {
                        // Landing on top
                        if (this.vy > 0 && this.y + this.height - this.vy <= plat.y + 5) {
                            this.y = plat.y - this.height;
                            this.vy = 0;
                            this.grounded = true;
                        }
                        // Hitting from below
                        else if (this.vy < 0 && this.y - this.vy >= plat.y + plat.height - 5) {
                            this.y = plat.y + plat.height;
                            this.vy = 0;
                        }
                        // Side collision
                        else if (this.vx > 0) {
                            this.x = plat.x - this.width;
                        } else if (this.vx < 0) {
                            this.x = plat.x + plat.width;
                        }
                    }
                }

                // Screen bounds
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
                if (this.y + this.height > canvas.height) {
                    this.y = canvas.height - this.height;
                    this.vy = 0;
                    this.grounded = true;
                }

                // Timers
                if (this.throwCooldown > 0) this.throwCooldown--;
                if (this.invincibleTimer > 0) {
                    this.invincibleTimer--;
                    if (this.invincibleTimer <= 0) this.invincible = false;
                }
            }

            throwShuriken() {
                const dir = this.facingRight ? 1 : -1;
                const sx = this.facingRight ? this.x + this.width : this.x;
                shurikens.push(new Shuriken(sx, this.y + 15, dir));
                SFX.throw();
            }

            takeDamage(amount) {
                if (this.invincible) return;
                this.hp -= amount;
                this.invincible = true;
                this.invincibleTimer = 60;
                updateUI();
                SFX.playerHurt();

                // Knockback
                this.vy = -5;

                if (this.hp <= 0) {
                    gameOver(false);
                }
            }

            collidesWith(obj) {
                return this.x < obj.x + obj.width &&
                       this.x + this.width > obj.x &&
                       this.y < obj.y + obj.height &&
                       this.y + this.height > obj.y;

        // Zombie class
        class Zombie {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 28;
                this.height = 40;
                this.vx = 0;
                this.vy = 0;
                this.speed = 2.5;
                this.hp = 2;
                this.facingRight = true;
                this.attackCooldown = 0;
                this.grounded = false;

                // Patrol
                this.patrolDir = Math.random() > 0.5 ? 1 : -1;
                this.patrolTimer = 60 + Math.random() * 60;
            }

            update() {
                const distToPlayer = Math.abs(this.x - player.x);
                const inRange = distToPlayer < 250;

                if (inRange && player.hp > 0) {
                    // Chase player
                    if (player.x < this.x) {
                        this.vx = -this.speed;
                        this.facingRight = false;
                    } else {
                        this.vx = this.speed;
                        this.facingRight = true;
                    }

                    // Attack if close (check both horizontal AND vertical distance)
                    const verticalDist = Math.abs(this.y - player.y);
                    if (distToPlayer < 35 && verticalDist < 30 && this.attackCooldown <= 0) {
                        SFX.zombieAttack();
                        player.takeDamage(1);
                        this.attackCooldown = 60;
                    }
                } else {
                    // Patrol
                    this.patrolTimer--;
                    if (this.patrolTimer <= 0) {
                        this.patrolDir *= -1;
                        this.patrolTimer = 60 + Math.random() * 60;
                    }
                    this.vx = this.patrolDir * (this.speed * 0.5);
                    this.facingRight = this.patrolDir > 0;
                }

                // Apply gravity
                this.vy += GRAVITY;

                // Update position
                this.x += this.vx;
                this.y += this.vy;

                // Platform collision
                this.grounded = false;
                for (let plat of platforms) {
                    if (this.collidesWith(plat)) {
                        if (this.vy > 0 && this.y + this.height - this.vy <= plat.y + 5) {
                            this.y = plat.y - this.height;
                            this.vy = 0;
                            this.grounded = true;
                        }
                    }
                }

                // Screen bounds
                if (this.x < 0) { this.x = 0; this.patrolDir = 1; }
                if (this.x + this.width > canvas.width) {
                    this.x = canvas.width - this.width;
                    this.patrolDir = -1;
                }
                if (this.y + this.height > canvas.height) {
                    this.y = canvas.height - this.height;
                    this.vy = 0;
                    this.grounded = true;
                }

                // Timers
                if (this.attackCooldown > 0) this.attackCooldown--;
            }

            takeDamage(amount) {
                this.hp -= amount;

                // Spawn particles
                for (let i = 0; i < 5; i++) {
                    particles.push(new Particle(
                        this.x + this.width / 2,
                        this.y + this.height / 2,
                        '#4a6b3a'
                    ));
                }

                if (this.hp <= 0) {
                    SFX.zombieDeath();
                    return true; // Dead
                }
                SFX.zombieHit();
                return false;
            }

            collidesWith(obj) {
                return this.x < obj.x + obj.width &&
                       this.x + this.width > obj.x &&
                       this.y < obj.y + obj.height &&
                       this.y + this.height > obj.y;
            }

            draw() {
                const x = this.x;
                const y = this.y;

                ctx.save();
                if (!this.facingRight) {
                    ctx.translate(x + this.width / 2, 0);
                    ctx.scale(-1, 1);
                    ctx.translate(-(x + this.width / 2), 0);
                }

                // Body (torn clothes)
                ctx.fillStyle = '#503828';
                ctx.fillRect(x + 5, y + 16, 18, 16);

                // Head (green zombie skin)
                ctx.fillStyle = '#648c50';
                ctx.fillRect(x + 7, y + 4, 14, 13);

                // Darker patches
                ctx.fillStyle = '#4a6b3a';
                ctx.fillRect(x + 9, y + 6, 10, 9);

                // Eyes (uneven)
                ctx.fillStyle = '#fff';
                ctx.fillRect(x + 9, y + 8, 4, 3);
                ctx.fillRect(x + 15, y + 9, 4, 3);
                ctx.fillStyle = '#000';
                ctx.fillRect(x + 10, y + 9, 2, 2);
                ctx.fillRect(x + 16, y + 10, 2, 2);

                // Mouth
                ctx.fillStyle = '#222';
                ctx.fillRect(x + 11, y + 13, 6, 3);
                ctx.fillStyle = '#fff';
                ctx.fillRect(x + 12, y + 13, 1, 2);
                ctx.fillRect(x + 15, y + 13, 1, 2);

                // Arms (reaching)
                ctx.fillStyle = '#648c50';
                ctx.fillRect(x + 0, y + 16, 6, 12);
                ctx.fillRect(x + 22, y + 18, 6, 10);

                // Legs
                ctx.fillStyle = '#3c2820';
                ctx.fillRect(x + 6, y + 32, 7, 8);
                ctx.fillRect(x + 15, y + 32, 7, 8);

                ctx.restore();
            }
        }

        // Flying Zombie class
        class FlyingZombie {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 28;
                this.height = 40;
                this.vx = 0;
                this.vy = 0;
                this.speed = 2;
                this.hp = 2;
                this.facingRight = true;
                this.attackCooldown = 0;
                this.wingTimer = 0;
                this.floatOffset = Math.random() * Math.PI * 2;
            }

            update() {
                const distX = player.x - this.x;
                const distY = player.y - this.y;
                const dist = Math.sqrt(distX * distX + distY * distY);

                if (dist < 400 && player.hp > 0) {
                    // Fly towards player
                    this.vx = (distX / dist) * this.speed;
                    this.vy = (distY / dist) * this.speed;
                    this.facingRight = distX > 0;

                    // Attack if close
                    if (dist < 40 && this.attackCooldown <= 0) {
                        SFX.zombieAttack();
                        player.takeDamage(1);
                        this.attackCooldown = 60;
                    }
                } else {
                    // Hover in place with slight movement
                    this.vx *= 0.95;
                    this.vy = Math.sin(Date.now() / 500 + this.floatOffset) * 0.5;
                }

                // Update position
                this.x += this.vx;
                this.y += this.vy;

                // Screen bounds
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
                if (this.y < 50) this.y = 50;
                if (this.y + this.height > canvas.height - 100) this.y = canvas.height - 100 - this.height;

                // Wing animation
                this.wingTimer += 0.3;

                // Timers
                if (this.attackCooldown > 0) this.attackCooldown--;
            }

            takeDamage(amount) {
                this.hp -= amount;

                for (let i = 0; i < 5; i++) {
                    particles.push(new Particle(
                        this.x + this.width / 2,
                        this.y + this.height / 2,
                        '#6a4a8a'
                    ));
                }

                if (this.hp <= 0) {
                    SFX.zombieDeath();
                    return true;
                }
                SFX.zombieHit();
                return false;
            }

            collidesWith(obj) {
                return this.x < obj.x + obj.width &&
                       this.x + this.width > obj.x &&
                       this.y < obj.y + obj.height &&
                       this.y + this.height > obj.y;
            }

            draw() {
                const x = this.x;
                const y = this.y;
                const wingFlap = Math.sin(this.wingTimer) * 8;

                ctx.save();
                if (!this.facingRight) {
                    ctx.translate(x + this.width / 2, 0);
                    ctx.scale(-1, 1);
                    ctx.translate(-(x + this.width / 2), 0);
                }

                // Wings (purple, bat-like)
                ctx.fillStyle = '#5a3a7a';
                ctx.beginPath();
                ctx.moveTo(x + 14, y + 18);
                ctx.lineTo(x - 15, y + 10 + wingFlap);
                ctx.lineTo(x - 5, y + 25);
                ctx.lineTo(x + 5, y + 20);
                ctx.closePath();
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(x + 14, y + 18);
                ctx.lineTo(x + 43, y + 10 - wingFlap);
                ctx.lineTo(x + 33, y + 25);
                ctx.lineTo(x + 23, y + 20);
                ctx.closePath();
                ctx.fill();

                // Body (purple tint)
                ctx.fillStyle = '#4a3858';
                ctx.fillRect(x + 5, y + 16, 18, 16);

                // Head (purple zombie skin)
                ctx.fillStyle = '#7a5a8a';
                ctx.fillRect(x + 7, y + 4, 14, 13);

                // Darker patches
                ctx.fillStyle = '#5a3a6a';
                ctx.fillRect(x + 9, y + 6, 10, 9);

                // Glowing red eyes
                ctx.fillStyle = '#ff3333';
                ctx.fillRect(x + 9, y + 8, 4, 3);
                ctx.fillRect(x + 15, y + 9, 4, 3);
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(x + 10, y + 9, 2, 2);
                ctx.fillRect(x + 16, y + 10, 2, 2);

                // Mouth
                ctx.fillStyle = '#222';
                ctx.fillRect(x + 11, y + 13, 6, 3);

                // No legs, just dangling feet stubs
                ctx.fillStyle = '#3a2830';
                ctx.fillRect(x + 8, y + 32, 5, 5);
                ctx.fillRect(x + 16, y + 32, 5, 5);

                ctx.restore();
            }
        }

        // Shuriken class
        class Shuriken {
            constructor(x, y, dir) {
                this.x = x;
                this.y = y;
                this.width = 14;
                this.height = 14;
                this.speed = 18;
                this.dir = dir;
                this.rotation = 0;
            }

            update() {
                this.x += this.speed * this.dir;
                this.rotation += 0.4;

                // Check collision with zombies
                for (let i = zombies.length - 1; i >= 0; i--) {
                    if (this.collidesWith(zombies[i])) {
                        if (zombies[i].takeDamage(1)) {
                            // Zombie died
                            for (let j = 0; j < 10; j++) {
                                particles.push(new Particle(
                                    zombies[i].x + zombies[i].width / 2,
                                    zombies[i].y + zombies[i].height / 2,
                                    '#648c50'
                                ));
                            }
                            zombies.splice(i, 1);
                            updateUI();
                        }
                        return true; // Remove shuriken
                    }
                }

                // Check platform collision
                for (let plat of platforms) {
                    if (this.collidesWith(plat)) {
                        // Spark particles
                        for (let i = 0; i < 3; i++) {
                            particles.push(new Particle(this.x, this.y, '#ccc'));
                        }
                        SFX.hit();
                        return true;
                    }
                }

                // Out of bounds
                if (this.x < -20 || this.x > canvas.width + 20) {
                    return true;
                }

                return false;
            }

            collidesWith(obj) {
                return this.x < obj.x + obj.width &&
                       this.x + this.width > obj.x &&
                       this.y < obj.y + obj.height &&
                       this.y + this.height > obj.y;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                ctx.rotate(this.rotation);

                // Draw 4-pointed star
                ctx.fillStyle = '#b4b4be';
                ctx.beginPath();
                for (let i = 0; i < 4; i++) {
                    const angle = (i * Math.PI / 2) - Math.PI / 2;
                    const outerX = Math.cos(angle) * 7;
                    const outerY = Math.sin(angle) * 7;
                    const innerAngle = angle + Math.PI / 4;
                    const innerX = Math.cos(innerAngle) * 3;
                    const innerY = Math.sin(innerAngle) * 3;

                    if (i === 0) ctx.moveTo(outerX, outerY);
                    else ctx.lineTo(outerX, outerY);
                    ctx.lineTo(innerX, innerY);
                }
                ctx.closePath();
                ctx.fill();

                // Center
                ctx.fillStyle = '#787888';
                ctx.beginPath();
                ctx.arc(0, 0, 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        // Particle class
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = (Math.random() - 0.5) * 6 - 2;
                this.life = 30;
                this.color = color;
                this.size = 3 + Math.random() * 3;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life--;
                return this.life <= 0;
            }

            draw() {
                ctx.globalAlpha = this.life / 30;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }

        // Platform class
        class Platform {
            constructor(x, y, width, height, isGround = false) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.isGround = isGround;
            }

            draw() {
                // Grass top
                ctx.fillStyle = '#508c3c';
                ctx.fillRect(this.x, this.y, this.width, 8);

                // Dirt
                ctx.fillStyle = '#64463c';
                ctx.fillRect(this.x, this.y + 8, this.width, this.height - 8);

                // Grass detail
                ctx.fillStyle = '#3c6e2d';
                for (let i = this.x; i < this.x + this.width; i += 12) {
                    ctx.fillRect(i, this.y, 4, 6);
                }

                // Dirt detail
                ctx.fillStyle = '#503828';
                for (let i = this.x + 5; i < this.x + this.width - 10; i += 25) {
                    ctx.fillRect(i, this.y + 15, 8, 6);
                }
            }
        }

                        { x: 100, y: 800 },
                        { x: 550, y: 800 },
                        { x: 950, y: 800 },
                        { x: 1400, y: 800 },
                        { x: 370, y: 650 },
                        { x: 770, y: 650 },
                        { x: 1170, y: 650 },
                        { x: 170, y: 480 },
                        { x: 1070, y: 480 },
                        { x: 1620, y: 480 },
                        { x: 320, y: 300 },
                        { x: 1370, y: 300 },
                        { x: 300, y: 200, flying: true },
                        { x: 700, y: 150, flying: true },
                        { x: 1100, y: 150, flying: true },
                        { x: 1500, y: 200, flying: true },
                    ]
                }
            };

            const level = levels[currentLevel];
            platforms = level.platforms;

            for (let point of level.zombies) {
                if (point.flying) {
                    zombies.push(new FlyingZombie(point.x, point.y));
                } else {
                    zombies.push(new Zombie(point.x, point.y));
                }
            }

            updateUI();
        }

        // Update UI
        function updateUI() {
            document.getElementById('hp').textContent = player.hp;
            document.getElementById('healthFill').style.width = (player.hp / player.maxHp * 100) + '%';
            document.getElementById('zombieCount').textContent = zombies.length;
            document.getElementById('levelNum').textContent = currentLevel;

            // Change health bar color
            const percent = player.hp / player.maxHp;
            const fill = document.getElementById('healthFill');
            if (percent > 0.5) {
                fill.style.background = 'linear-gradient(to bottom, #4f4, #2a2)';
            } else if (percent > 0.25) {
                fill.style.background = 'linear-gradient(to bottom, #ff4, #aa2)';
            } else {
                fill.style.background = 'linear-gradient(to bottom, #f44, #a22)';
            }
        }

        // Game over
        function gameOver(won) {
            gameRunning = false;
            Music.stop();
            if (won) {
                if (currentLevel < maxLevel) {
                    document.getElementById('levelComplete').classList.remove('hidden');
                    document.getElementById('completedLevel').textContent = currentLevel;
                } else {
                    document.getElementById('victory').classList.remove('hidden');
                }
                SFX.victory();
            } else {
                document.getElementById('gameOver').classList.remove('hidden');
                document.getElementById('deathLevel').textContent = currentLevel;
                SFX.gameOver();
            }
        }

        function nextLevel() {
            currentLevel++;
            document.getElementById('levelComplete').classList.add('hidden');
            initGame();
            gameRunning = true;
            Music.start();
        }

        function retryLevel() {
            document.getElementById('gameOver').classList.add('hidden');
            initGame();
            gameRunning = true;
            Music.start();
        }

        // Start game
        function startGame() {
            initAudio();
            currentLevel = 1;
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('gameOver').classList.add('hidden');
            document.getElementById('victory').classList.add('hidden');
            document.getElementById('levelComplete').classList.add('hidden');
            initGame();
            gameRunning = true;
            Music.start();
        }

        // Draw background
        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#2d2d44');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stars (more for larger canvas)
            ctx.fillStyle = '#fff';
            const starPositions = [
                [50,30],[150,60],[280,45],[400,80],[550,35],[700,65],[850,40],[1000,70],
                [1150,30],[1300,55],[1450,45],[1600,75],[1700,35],
                [100,120],[300,100],[500,140],[750,110],[950,130],[1200,105],[1400,125],[1650,115]
            ];
            for (let [x, y] of starPositions) {
                ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 500 + x) * 0.3;
                ctx.fillRect(x, y, 3, 3);
            }
            ctx.globalAlpha = 1;

            // Moon (larger and repositioned)
            ctx.fillStyle = '#e8e8d0';
            ctx.beginPath();
            ctx.arc(1600, 120, 60, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#d0d0b8';
            ctx.beginPath();
            ctx.arc(1580, 110, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(1620, 135, 10, 0, Math.PI * 2);
            ctx.fill();
        }

        // Game loop
        function gameLoop() {
            // Draw background
            drawBackground();

            if (gameRunning && player) {
                // Update
                player.update();

                for (let zombie of zombies) {
                    zombie.update();
                }

                // Update shurikens
                for (let i = shurikens.length - 1; i >= 0; i--) {
                    if (shurikens[i].update()) {
                        shurikens.splice(i, 1);
                    }
                }

                // Update particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    if (particles[i].update()) {
                        particles.splice(i, 1);
                    }
                }

                // Check victory
                if (zombies.length === 0) {
                    gameOver(true);
                }
            }

            // Draw platforms
            for (let plat of platforms) {
                plat.draw();
            }

            // Draw game objects
            if (gameRunning || document.getElementById('gameOver').classList.contains('hidden') === false ||
                document.getElementById('victory').classList.contains('hidden') === false) {

                for (let zombie of zombies) {
                    zombie.draw();
                }

                for (let shuriken of shurikens) {
                    shuriken.draw();
                }

                for (let particle of particles) {
                    particle.draw();
                }

                if (player && player.hp > 0) {
                    player.draw();
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // Input handlers
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (['Space', 'ArrowUp', 'ArrowDown'].includes(e.code)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        canvas.addEventListener('mousedown', (e) => {
            mouseDown = true;
        });

        document.addEventListener('mouseup', (e) => {
            mouseDown = false;
        });

        // Start game loop
        gameLoop();
    </script>
</body>
</html>
