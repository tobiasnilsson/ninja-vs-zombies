<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ninja vs Zombies - Prototype</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="game" width="1800" height="1000"></canvas>
        <div id="ui">
            <div id="healthBar"><div id="healthFill" style="width: 100%"></div></div>
            <div id="stats">Level: <span id="levelNum">1</span> | HP: <span id="hp">5</span>/5 | Zombies: <span id="zombieCount">0</span></div>
        </div>
        <div id="controls">A/D or Arrows: Move | Space: Jump | Click, F or Ctrl: Throw Shuriken</div>

        <!-- Touch Controls for Mobile/iPad -->
        <div id="touchControls">
            <div id="touchLeft">
                <button id="btnLeft" class="touchBtn moveBtn">◀</button>
                <button id="btnRight" class="touchBtn moveBtn">▶</button>
            </div>
            <div id="touchRight">
                <button id="btnJump" class="touchBtn actionBtn">JUMP</button>
                <button id="btnAttack" class="touchBtn actionBtn attackBtn">★</button>
            </div>
        </div>
        <div id="musicControl">
            <label>🎵 <input type="range" id="volumeSlider" min="0" max="100" value="30" onchange="Music.setVolume(this.value/100)"></label>
        </div>

        <div id="overlay">
            <h1>🥷 Ninja vs Zombies</h1>
            <p>Defeat all zombies to win!</p>
            <button onclick="startGame()">Start Game</button>
        </div>

        <div id="gameOver" class="hidden">
            <h1>Game Over</h1>
            <p>The zombies got you on level <span id="deathLevel">1</span>!</p>
            <button onclick="retryLevel()">Retry Level</button>
            <button onclick="startGame()">Restart Game</button>
        </div>

        <div id="victory" class="hidden">
            <h1>Victory!</h1>
            <p>You completed all levels!</p>
            <button onclick="startGame()">Play Again</button>
        </div>

        <div id="levelComplete" class="hidden">
            <h1>Level <span id="completedLevel">1</span> Complete!</h1>
            <p>Get ready for the next challenge...</p>
            <button onclick="nextLevel()">Next Level</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
